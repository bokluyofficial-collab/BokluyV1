<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bokluy Dashboard</title>
  <link rel="stylesheet" href="./dashboard.css" />
</head>
<body>
  <div class="dashboard-shell">
    <header class="site-header">
      <div class="container nav-row">
        <a class="brand" href="./home.html" aria-label="Bokluy home">
          <img class="brand-logo" src="./images/logo.png" alt="Bokluy" />
          <span class="brand-text">
            <strong>Bokluy</strong>
            <span>Dashboard Router</span>
          </span>
        </a>

        <div class="nav-actions">
          <a class="ghost-btn" href="./index.html">Marketplace</a>
          <a class="ghost-btn" href="./home.html">Home</a>
        </div>
      </div>
    </header>

    <main class="main-wrap">
      <div class="container">
        <section class="hero-card">
          <span class="eyebrow">Dashboard</span>
          <h1>Checking your role...</h1>
          <p>You will be redirected automatically.</p>
        </section>

        <div class="status-card" id="statusCard">Loading account information...</div>
      </div>
    </main>
  </div>

  <script type="module" src="./dashboard-router.js"></script>
</body>
</html>
